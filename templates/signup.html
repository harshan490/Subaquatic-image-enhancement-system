<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Subaquatic Enhancement</title>
    <link rel="stylesheet" href="/static/auth.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            width: 100%;
        }

        body {
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: block;
            overflow: hidden;
        }

        /* ============ HERO SECTION ============ */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .hero-content {
            position: relative;
            z-index: 5;
            max-width: 900px;
            padding: 40px;
            animation: fadeInUp 1s ease both;
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            color: #FFFFFF;
            margin-bottom: 30px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            letter-spacing: -1px;
            line-height: 1.2;
            word-spacing: 0.15em;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 50px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: #34C759;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.8s ease 0.3s both;
        }

        .hero-cta:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            background: #FFFFFF;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            animation: bounce 2s infinite;
        }

        .scroll-icon {
            width: 40px;
            height: 60px;
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 8px;
        }

        .scroll-dot {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            animation: scrollDot 1.5s infinite;
        }

        /* ============ SIGNUP FORM SECTION ============ */
        .auth-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            overflow-y: auto;
            max-height: 100vh;
        }

        /* ============ ANIMATIONS ============ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(10px);
            }
        }

        @keyframes scrollDot {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(20px);
                opacity: 0;
            }
        }

        /* ============ SCROLL ANIMATIONS ============ */
        @keyframes fadeInOnScroll {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scroll-fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .scroll-fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .hero-title {
                margin-bottom: 20px;
            }

            .hero-subtitle {
                margin-bottom: 30px;
            }

            .bottom-blur-overlay {
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- Aurora Background -->
    <canvas id="auroraCanvas" class="aurora-bg"></canvas>

    <!-- Floating Elements -->
    <div class="floating-elements">
        <div class="float-element float-1"></div>
        <div class="float-element float-2"></div>
        <div class="float-element float-3"></div>
        <div class="float-element float-4"></div>
        <div class="float-element float-5"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="top-nav">
        <a href="/" class="nav-brand">Subaquatic AI</a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/about" class="nav-link">About</a>
            <div class="nav-auth">
                <a href="/login" class="nav-link login-nav-btn">Login</a>
                <a href="/signup" class="nav-link signup-nav-btn active">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- ============ AUTH SECTION ============ -->
    <section class="auth-section" id="authSection">
        <div class="auth-container">
            <!-- Signup Card -->
            <div class="auth-card signup-card">
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-desc">Join us to enhance your underwater images</p>

                <form id="signupForm" class="auth-form">
                    <!-- Username Input -->
                    <div class="input-group">
                        <label for="signup-username" class="input-label">Username</label>
                        <input 
                            type="text" 
                            id="signup-username" 
                            name="username" 
                            class="input-field" 
                            placeholder="Choose a username"
                            required
                        >
                        <div class="input-underline"></div>
                    </div>

                    <!-- Email Input -->
                    <div class="input-group">
                        <label for="signup-email" class="input-label">Email Address</label>
                        <input 
                            type="email" 
                            id="signup-email" 
                            name="email" 
                            class="input-field" 
                            placeholder="your@email.com"
                            required
                        >
                        <div class="input-underline"></div>
                    </div>

                    <!-- Password Input -->
                    <div class="input-group">
                        <label for="signup-password" class="input-label">Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="signup-password" 
                                name="password" 
                                class="input-field" 
                                placeholder="Min. 6 characters"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('signup-password')">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                        <div class="input-underline"></div>
                    </div>

                    <!-- Confirm Password Input -->
                    <div class="input-group">
                        <label for="signup-confirm" class="input-label">Confirm Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="signup-confirm" 
                                name="confirm_password" 
                                class="input-field" 
                                placeholder="Confirm your password"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('signup-confirm')">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                        <div class="input-underline"></div>
                    </div>

                    <!-- Error Message -->
                    <div class="error-message" id="signupError"></div>

                    <!-- Submit Button -->
                    <button type="submit" class="auth-button signup-button">
                        <span class="button-text">Create Account</span>
                        <span class="button-glow"></span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="auth-divider">
                    <span>Already have an account?</span>
                </div>

                <!-- Login Link -->
                <a href="/login" class="auth-link login-link-signup">
                    Sign in instead
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </a>
            </div>
        </div>
    </section>

    <script src="/static/aurora.js"></script>
    <script src="/static/auth.js"></script>
    <script>
        // Add visible class to auth card on load
        window.addEventListener('load', () => {
            const authCard = document.querySelector('.auth-card');
            if (authCard) {
                authCard.classList.add('scroll-fade-in');
                setTimeout(() => {
                    authCard.classList.add('visible');
                }, 100);
            }
        });
    </script>
</body>
</html>
