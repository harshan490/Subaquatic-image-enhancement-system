<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subaquatic Image Enhancement</title>
    <!-- Importing Outfit font to match the frontend -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Aurora Background -->
    <canvas id="auroraCanvas" class="aurora-bg"></canvas>

    <!-- Main Container -->
    <div class="main-wrapper">
        <!-- Header Section -->
        <div class="header-section">
            <div class="header-top">
                <h1 class="app-title gemini-text">Sub-Aquatic Enhancement</h1>
                <a href="/logout" class="logout-btn">
                    <span>Logout</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </a>
            </div>
            <p class="app-subtitle">AI-powered underwater image quality improvement</p>
        </div>

        <!-- Content Container -->
        <div class="content-container">
            
            <!-- Original Image -->
            <div class="image-card original-card">
                <div class="card-header">
                    <div class="card-label">Original Image</div>
                </div>
                <div class="image-display" id="originalDisplay">
                    <canvas id="originalCanvas"></canvas>
                    <div class="image-overlay">
                        <span class="overlay-text">Upload an image</span>
                    </div>
                    <!-- Expand Button -->
                    <button class="expand-btn" onclick="openLightbox('originalCanvas')" aria-label="Expand Original Image" id="originalExpandBtn" style="display: none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <polyline points="9 21 3 21 3 15"></polyline>
                            <line x1="21" y1="3" x2="14" y2="10"></line>
                            <line x1="3" y1="21" x2="10" y2="14"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Controls Panel -->
            <div class="controls-card">
                <div class="controls-header">
                    <h2 class="controls-title">Enhancement Tools</h2>
                </div>

                <div class="status-indicator">
                    <span class="status-dot" id="statusDot"></span>
                    <span class="status-text" id="statusText">Ready</span>
                </div>

                <div class="button-group">
                    <button class="glass-button primary-btn" onclick="triggerUpload()">
                        <div class="btn-bg"></div>
                        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <span>Upload Image</span>
                    </button>
                    <input type="file" id="fileInput" hidden accept="image/*">

                    <button class="glass-button secondary-btn" onclick="startEnhancement()">
                        <div class="btn-bg"></div>
                        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="1"></circle>
                            <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m6.08 0l4.24-4.24M1 12h6m6 0h6m-1.78 7.78l-4.24-4.24m-6.08 0l-4.24 4.24"></path>
                        </svg>
                        <span>Enhance</span>
                    </button>

                    <button class="glass-button danger-btn" onclick="window.location.reload()">
                        <div class="btn-bg"></div>
                        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <polyline points="3 6 5 4 7 6"></polyline>
                            <path d="M6 5v7a6 6 0 0 0 6 6h3"></path>
                        </svg>
                        <span>Reset</span>
                    </button>
                </div>

                <div class="info-card">
                    <div class="info-item">
                        <span class="info-label">Processing</span>
                        <span class="info-value" id="processingTime">0.0s</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Quality</span>
                        <span class="info-value">High</span>
                    </div>
                </div>
            </div>

            <!-- Enhanced Image -->
            <div class="image-card enhanced-card">
                <div class="card-header">
                    <div class="card-label">Enhanced Result</div>
                </div>
                <div class="image-display" id="enhancedDisplay">
                    <canvas id="resultCanvas"></canvas>
                    
                    <!-- Loading Animation -->
                    <div class="loading-overlay" id="loadingOverlay">
                        <div class="loader-wrapper">
                            <span class="loader-letter">G</span>
                            <span class="loader-letter">e</span>
                            <span class="loader-letter">n</span>
                            <span class="loader-letter">e</span>
                            <span class="loader-letter">r</span>
                            <span class="loader-letter">a</span>
                            <span class="loader-letter">t</span>
                            <span class="loader-letter">i</span>
                            <span class="loader-letter">n</span>
                            <span class="loader-letter">g</span>
                            <div class="loader"></div>
                        </div>
                    </div>

                    <!-- Expand Button -->
                    <button class="expand-btn" onclick="openLightbox('resultCanvas')" aria-label="Expand Enhanced Image" id="enhancedExpandBtn" style="display: none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <polyline points="9 21 3 21 3 15"></polyline>
                            <line x1="21" y1="3" x2="14" y2="10"></line>
                            <line x1="3" y1="21" x2="10" y2="14"></line>
                        </svg>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox-modal" id="lightboxModal" onclick="closeLightbox(event)">
        <div class="lightbox-content">
            <button class="lightbox-close" onclick="closeLightbox(event)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <img id="lightboxImage" src="" alt="Expanded view">
        </div>
    </div>

    <script src="/static/aurora.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
